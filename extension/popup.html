<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: #1e2d4d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
      padding: 16px 16px 20px;
    }

    /* Title */
    h1 { text-align:center; font-size:17px; font-weight:700; margin-bottom:14px; }

    /* Divider */
    hr { border:none; border-top:1px solid #3a4f78; margin:12px 0; }

    /* Inputs + select */
    input, select {
      width:100%; padding:9px 12px; border:none; border-radius:8px;
      background:#fff; color:#222; font-size:14px; margin-bottom:8px; outline:none;
    }
    input::placeholder { color:#aaa; }
    select { cursor:pointer; }

    /* Buttons */
    .btn {
      width:100%; padding:9px; background:#28a745; color:#fff;
      border:none; border-radius:8px; font-size:14px; font-weight:600;
      cursor:pointer; margin-bottom:8px; transition:background .15s;
    }
    .btn:hover  { background:#218838; }
    .btn:active { background:#1e7e34; }
    .btn-row    { display:flex; gap:8px; }
    .btn-row .btn { margin-bottom:8px; }

    /* Status bar */
    #statusBar {
      display:flex; align-items:center; justify-content:space-between;
      background:#162340; border-radius:7px; padding:6px 10px;
      margin-bottom:10px; font-size:12px;
    }
    #statusText       { color:#a8c0e8; }
    #statusText span  { color:#5eda7f; font-weight:700; }
    #btnLogout {
      padding:4px 10px; font-size:12px; background:#dc3545;
      border-radius:6px; border:none; color:#fff; cursor:pointer;
      font-weight:600; transition:background .15s;
    }
    #btnLogout:hover { background:#c82333; }

    /* Strength bar */
    #strengthWrap { margin-bottom:8px; }
    #strengthBar  {
      height:5px; border-radius:3px; background:#3a4f78; overflow:hidden; margin-bottom:3px;
    }
    #strengthFill {
      height:100%; width:0%; border-radius:3px; transition:width .25s, background .25s;
    }
    #strengthLabel { font-size:11px; color:#a8c0e8; text-align:right; }

    /* Alerts */
    .alert {
      padding:7px 10px; border-radius:7px; font-size:12px;
      margin-bottom:8px; display:none;
    }
    .alert-err { background:#3d1a1a; color:#ff8080; border:1px solid #6b2020; }
    .alert-ok  { background:#1a3d24; color:#80ff9f; border:1px solid #206b30; }

    /* Section visibility */
    #loginSection, #mainSection { display:none; }
  </style>
</head>
<body>

  <h1>🔐 Password Manager</h1>
  <div id="alertBox" class="alert"></div>

  <!-- ════ LOGIN SECTION (shown when not logged in) ════ -->
  <section id="loginSection">
    <input type="text"     id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Master Password">
    <button class="btn"    id="btnLogin">Login</button>
  </section>

  <!-- ════ MAIN SECTION (shown after login) ════ -->
  <section id="mainSection">

    <!-- Who is logged in + logout -->
    <div id="statusBar">
      <div id="statusText">Logged in as <span id="loggedUser">—</span></div>
      <button id="btnLogout">Logout</button>
    </div>

    <hr>

    <!-- Dropdown: select a saved entry -->
    <select id="savedSelect">
      <option value="">— Select saved entry to load —</option>
    </select>

    <!-- Fields -->
    <input type="text"     id="siteInput" placeholder="Site">
    <input type="text"     id="userInput" placeholder="Username">
    <input type="password" id="passInput" placeholder="Password">

    <!-- Live strength indicator -->
    <div id="strengthWrap">
      <div id="strengthBar"><div id="strengthFill"></div></div>
      <div id="strengthLabel">—</div>
    </div>

    <!-- Action buttons -->
    <button class="btn" id="btnGenerate">Generate Password</button>
    <div class="btn-row">
      <button class="btn" id="btnCopyUser">Copy User</button>
      <button class="btn" id="btnCopyPass">Copy Pass</button>
    </div>
    <button class="btn" id="btnSave">Save</button>
    <button class="btn" id="btnGet">Get</button>
    <button class="btn" id="btnAutoFill"><strong>Auto Fill</strong></button>

  </section>

  <script src="popup.js"></script>
</body>
</html>
